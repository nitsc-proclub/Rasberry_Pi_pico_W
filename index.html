<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>とうほくプロコンワークショップ</title>
    <meta name="description" content="とうほくプロコンワークショップの講座が並んだ入口ページです。">
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f9fc;
            --text-color: #2c3e50;
            --heading-color: #1c2833;
            --border-color: #e0e7ef;
            --accent-blue: #02a1fd;
            --accent-yellow: #f9d805;
            --main-bg: #ffffff;
            --footer-text: #888888;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #ecf0f1;
                --heading-color: #ffffff;
                --border-color: #34495e;
                --accent-blue: #3498db;
                --accent-yellow: #f1c40f;
                --main-bg: #212121;
                --footer-text: #b8c0c7;
            }
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: 'Noto Sans JP', "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Segoe UI", system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header.site {
            padding: 1rem 1.5rem;
            border-bottom: 2px solid;
            border-image: linear-gradient(to right, var(--accent-blue), var(--accent-yellow)) 1;
            background-color: var(--main-bg);
            display: flex;
            align-items: center;
        }

        header.site h1 {
            margin: 0;
            color: var(--heading-color);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .page {
            min-height: calc(100vh - 72px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px 16px;
        }

        .content {
            width: min(960px, 100%);
            margin: 0 auto;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .project-card {
            display: flex;
            min-height: 240px;
            padding: 28px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--main-bg);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            color: inherit;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 5px;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-yellow));
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
            border-color: rgba(2, 161, 253, 0.35);
        }

        .project-card:focus-visible {
            outline: 3px solid var(--accent-blue);
            outline-offset: 4px;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 20px;
        }

        .project-title {
            margin: 0;
            color: var(--heading-color);
            font-size: clamp(1.25rem, 2.1vw, 1.7rem);
            line-height: 1.45;
            font-weight: 700;
        }

        .project-date {
            margin: 0;
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .project-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0.65rem 1rem;
            border-radius: 8px;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-yellow));
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
        }

        footer.site-footer {
            width: min(960px, 100%);
            margin: 24px auto 0;
            padding: 1.4rem 1rem 0;
            text-align: center;
            color: var(--footer-text);
            border-top: 2px solid;
            border-image: linear-gradient(to right, var(--accent-blue), var(--accent-yellow)) 1;
        }

        footer.site-footer p {
            margin: 0;
        }

        @media (max-width: 768px) {
            .page {
                justify-content: flex-start;
                padding: 16px;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .project-card {
                min-height: 180px;
                padding: 22px;
            }

            .project-title {
                font-size: clamp(1.15rem, 5vw, 1.45rem);
            }

            .card-footer {
                align-items: flex-start;
            }

            footer.site-footer {
                margin-top: 16px;
            }
        }
    </style>
</head>

<body>
    <header class="site">
        <h1>とうほくプロコンワークショップ</h1>
    </header>

    <div class="page">
        <main class="content">
            <section class="card-grid" aria-label="プロジェクト一覧">
                <a class="project-card" href="pico-heat.html">
                    <div class="card-body">
                        <h1 class="project-title">Pythonでセンサープログラミング～ラズパイPicoで酷暑を乗り切ろう～</h1>
                        <div class="card-footer">
                            <p class="project-date">2025-08-20</p>
                            <span class="project-button">ページを見る</span>
                        </div>
                    </div>
                </a>

                <a class="project-card" href="iot-switch.html">
                    <div class="card-body">
                        <h1 class="project-title">Pythonでガジェット開発プログラミング～ラズパイ Pico W で「どこでもポチっとIoTスイッチ」～</h1>
                        <div class="card-footer">
                            <p class="project-date">2026-03-26</p>
                            <span class="project-button">ページを見る</span>
                        </div>
                    </div>
                </a>
            </section>
        </main>

        <footer class="site-footer">
            <p>制作：2026 仙台高専プログラミング部</p>
        </footer>
    </div>
</body>

</html>
